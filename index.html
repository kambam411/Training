<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Student Management System</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        table { width: 100%; border-collapse: collapse; margin-top: 20px; }\n        th, td { border: 1px solid #dddddd; text-align: left; padding: 8px; }\n        th { background-color: #f2f2f2; }\n        input[type='text'], input[type='number'] { width: 100%; padding: 8px; }\n        button { padding: 10px 15px; margin-top: 10px; }\n    </style>\n</head>\n<body>\n    <h1>Student Management System</h1>\n    <input type="text" id="studentName" placeholder="Enter Student Name" required>\n    <input type="number" id="studentAge" placeholder="Enter Student Age" required>\n    <button onclick="addStudent()">Add Student</button>\n    <table id="studentTable">\n        <tr>\n            <th>Name</th>\n            <th>Age</th>\n            <th>Actions</th>\n        </tr>\n    </table>\n    <script>\n        let students = [];\n        function addStudent() {\n            const name = document.getElementById('studentName').value;\n            const age = document.getElementById('studentAge').value;\n            if(name && age) {\n                students.push({ name, age });\n                document.getElementById('studentName').value = '';\n                document.getElementById('studentAge').value = '';\n                renderTable();\n            } else {\n                alert('Please fill in both fields.');\n            }\n        }\n        function renderTable() {\n            const table = document.getElementById('studentTable');\n            table.innerHTML = '<tr><th>Name</th><th>Age</th><th>Actions</th></tr>';\n            students.forEach((student, index) => {\n                const row = table.insertRow();\n                row.insertCell(0).innerText = student.name;\n                row.insertCell(1).innerText = student.age;\n                const actionCell = row.insertCell(2);\n                actionCell.innerHTML = '<button onclick="deleteStudent(' + index + ')">Delete</button>';\n            });\n        }\n        function deleteStudent(index) {\n            students.splice(index, 1);\n            renderTable();\n        }\n    <\/script>\n</body>\n</html>
