<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; }
        button { margin-top: 10px; }
        .form-container { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Student Management System</h1>
    <div class="form-container">
        <h2>Add Student</h2>
        <form id="student-form">
            <input type="text" id="student-name" placeholder="Enter student name" required />
            <input type="text" id="student-age" placeholder="Enter student age" required />
            <button type="submit">Add Student</button>
        </form>
    </div>
    <h2>Student List</h2>
    <table id="student-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Student rows will be added here dynamically -->
        </tbody>
    </table>
    <script>
        const form = document.getElementById('student-form');
        const tableBody = document.getElementById('student-table').getElementsByTagName('tbody')[0];
        let students = [];

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('student-name').value;
            const age = document.getElementById('student-age').value;
            addStudent(name, age);
            form.reset();
        });

        function addStudent(name, age) {
            const student = { name, age };
            students.push(student);
            renderStudents();
        }

        function renderStudents() {
            tableBody.innerHTML = '';
            students.forEach((student, index) => {
                const row = tableBody.insertRow();
                row.insertCell(0).textContent = student.name;
                row.insertCell(1).textContent = student.age;
                const actionsCell = row.insertCell(2);
                actionsCell.innerHTML = `<button onclick="editStudent(${index})">Edit</button> <button onclick="deleteStudent(${index})">Delete</button>`;
            });
        }

        function editStudent(index) {
            const name = prompt('Enter new name:', students[index].name);
            const age = prompt('Enter new age:', students[index].age);
            if (name && age) {
                students[index] = { name, age };
                renderStudents();
            }
        }

        function deleteStudent(index) {
            students.splice(index, 1);
            renderStudents();
        }
    </script>
</body>
</html>
